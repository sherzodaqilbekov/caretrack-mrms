<!DOCTYPE html>
<html lang="uz">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Boshqaruv paneli - CareTrack Clinic</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet" />
  <style>
    :root {
      --ct-primary:   #2B4FD8;
      --ct-secondary: #00BCD4;
      --ct-accent:    #7B8FD4;
      --ct-bg:        #B3EEF8;
      --ct-dark:      #1A2FA8;
      --bs-primary:         #2B4FD8;
      --bs-primary-rgb:     43,79,216;
      --bs-info:            #00BCD4;
      --bs-info-rgb:        0,188,212;
      --bs-link-color:      #2B4FD8;
      --bs-link-color-rgb:  43,79,216;
    }
    body { background: var(--ct-bg); }
    /* ── Navbar ── */
    .navbar { background-color: var(--ct-primary) !important; box-shadow: 0 2px 14px rgba(43,79,216,.35); }
    .nav-link { border-radius: 7px; padding: .4rem .8rem !important; transition: background .15s; font-size: .9rem; }
    .nav-link:hover { background: rgba(255,255,255,.18); }
    .nav-active { background: rgba(255,255,255,.22) !important; font-weight: 600; }
    /* ── Cards ── */
    .card { border: none; border-radius: 14px; box-shadow: 0 2px 12px rgba(0,0,0,.07); }
    .card-header { border-radius: 14px 14px 0 0 !important; border-bottom: none; }
    /* ── Stat cards ── */
    .stat-card { transition: transform .18s, box-shadow .18s; cursor: pointer; overflow: hidden; }
    .stat-card:hover { transform: translateY(-6px); box-shadow: 0 14px 32px rgba(0,0,0,.14) !important; }
    .stat-icon {
      width: 72px; height: 72px; border-radius: 18px;
      display: flex; align-items: center; justify-content: center;
      font-size: 2rem; flex-shrink: 0;
    }
    .stat-number { font-size: 2.4rem; font-weight: 800; line-height: 1; }
    .stat-label { font-size: .82rem; color: #6c757d; font-weight: 500; }
    .stat-footer {
      font-size: .8rem; padding: .6rem 1.25rem;
      display: flex; align-items: center; gap: .4rem;
    }
    /* ── Welcome ── */
    .welcome-card {
      background: linear-gradient(135deg, var(--ct-primary) 0%, var(--ct-dark) 100%);
      color: #fff; border-radius: 16px;
      padding: 2rem 2rem 1.75rem;
      box-shadow: 0 8px 24px rgba(43,79,216,.35);
      margin-bottom: 2rem;
    }
    .welcome-card h2 { font-weight: 800; font-size: 1.6rem; }
    .welcome-avatar {
      width: 56px; height: 56px; background: rgba(255,255,255,.2);
      border-radius: 50%; display: flex; align-items: center;
      justify-content: center; font-size: 1.5rem; flex-shrink: 0;
    }
    /* Bootstrap primary overrides */
    .bg-primary { background-color: var(--ct-primary) !important; }
    .text-primary { color: var(--ct-primary) !important; }
    .btn-primary { background-color: var(--ct-primary) !important; border-color: var(--ct-primary) !important; }
    .btn-primary:hover { background-color: var(--ct-dark) !important; border-color: var(--ct-dark) !important; }
    .btn-light.text-primary { color: var(--ct-primary) !important; }
    .stat-icon.bg-primary.bg-opacity-10 { background-color: rgba(43,79,216,.1) !important; }
    .stat-footer.bg-primary.bg-opacity-10 { background-color: rgba(43,79,216,.1) !important; }
    .table-primary { --bs-table-bg: rgba(43,79,216,.1); --bs-table-striped-bg: rgba(43,79,216,.15); }
  </style>
</head>
<body>

  <!-- Navbar -->
  <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
    <div class="container">
      <a class="navbar-brand fw-bold d-flex align-items-center gap-2" href="dashboard.html">
        <i class="bi bi-heart-pulse-fill fs-5"></i> CareTrack TYBT
      </a>
      <button class="navbar-toggler border-0" type="button" data-bs-toggle="collapse" data-bs-target="#navMain">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="navMain">
        <ul class="navbar-nav ms-auto align-items-lg-center gap-lg-1 my-2 my-lg-0">
          <li class="nav-item">
            <a class="nav-link nav-active" href="dashboard.html"><i class="bi bi-speedometer2 me-1"></i>Bosh sahifa</a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="doctors.html"><i class="bi bi-person-badge me-1"></i>Shifokorlar</a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="patients.html"><i class="bi bi-people me-1"></i>Bemorlar</a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="diagnoses.html"><i class="bi bi-clipboard2-pulse me-1"></i>Tashxislar</a>
          </li>
          <li class="nav-item d-none" id="navUsersLink">
            <a class="nav-link" href="users.html"><i class="bi bi-person-gear me-1"></i>Xodimlar</a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="my-profile.html"><i class="bi bi-person-circle me-1"></i>Mening hisobim</a>
          </li>
        </ul>
        <div class="d-flex align-items-center gap-2 ms-lg-3 mt-2 mt-lg-0">
          <div class="text-white lh-sm text-end border-start border-white border-opacity-25 ps-3">
            <div class="fw-bold small" id="navFullName"></div>
            <span class="badge bg-white bg-opacity-25 text-white" style="font-size:.7rem" id="navRole"></span>
          </div>
          <button class="btn btn-sm btn-light text-primary fw-semibold" onclick="logout()">
            <i class="bi bi-box-arrow-right me-1"></i>Chiqish
          </button>
        </div>
      </div>
    </div>
  </nav>

  <!-- Main -->
  <div class="container my-4">

    <!-- Welcome card -->
    <div class="welcome-card d-flex align-items-center gap-3">
      <div class="welcome-avatar"><i class="bi bi-person-fill"></i></div>
      <div>
        <div class="opacity-75 small mb-1 text-uppercase" style="letter-spacing:.06em">Xush kelibsiz</div>
        <h2 class="mb-0" id="greetName">—</h2>
        <div class="opacity-75 small mt-1"><i class="bi bi-shield-check me-1"></i><span id="greetRole"></span></div>
      </div>
    </div>

    <!-- Stat cards -->
    <div class="row g-4">
      <!-- Shifokorlar -->
      <div class="col-sm-6 col-lg-4">
        <a href="doctors.html" class="text-decoration-none">
          <div class="card stat-card h-100">
            <div class="card-body p-4 d-flex align-items-center gap-4">
              <div class="stat-icon bg-primary bg-opacity-10 text-primary">
                <i class="bi bi-person-badge-fill"></i>
              </div>
              <div>
                <div class="stat-label mb-1"><i class="bi bi-dot me-1 text-primary"></i>Jami shifokorlar</div>
                <div class="stat-number text-primary" id="countDoctors">—</div>
              </div>
            </div>
            <div class="stat-footer bg-primary bg-opacity-10 text-primary fw-semibold">
              Shifokorlar ro'yxati <i class="bi bi-arrow-right ms-auto"></i>
            </div>
          </div>
        </a>
      </div>

      <!-- Bemorlar -->
      <div class="col-sm-6 col-lg-4">
        <a href="patients.html" class="text-decoration-none">
          <div class="card stat-card h-100">
            <div class="card-body p-4 d-flex align-items-center gap-4">
              <div class="stat-icon bg-success bg-opacity-10 text-success">
                <i class="bi bi-people-fill"></i>
              </div>
              <div>
                <div class="stat-label mb-1"><i class="bi bi-dot me-1 text-success"></i>Jami bemorlar</div>
                <div class="stat-number text-success" id="countPatients">—</div>
              </div>
            </div>
            <div class="stat-footer bg-success bg-opacity-10 text-success fw-semibold">
              Bemorlar ro'yxati <i class="bi bi-arrow-right ms-auto"></i>
            </div>
          </div>
        </a>
      </div>

      <!-- Tashxislar -->
      <div class="col-sm-6 col-lg-4">
        <a href="diagnoses.html" class="text-decoration-none">
          <div class="card stat-card h-100">
            <div class="card-body p-4 d-flex align-items-center gap-4">
              <div class="stat-icon bg-warning bg-opacity-10 text-warning">
                <i class="bi bi-clipboard2-pulse-fill"></i>
              </div>
              <div>
                <div class="stat-label mb-1"><i class="bi bi-dot me-1 text-warning"></i>Jami tashxislar</div>
                <div class="stat-number text-warning" id="countDiagnoses">—</div>
              </div>
            </div>
            <div class="stat-footer bg-warning bg-opacity-10 text-warning fw-semibold">
              Tashxislar ro'yxati <i class="bi bi-arrow-right ms-auto"></i>
            </div>
          </div>
        </a>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script>
    const token    = localStorage.getItem('token');
    const role     = localStorage.getItem('role');
    const fullName = localStorage.getItem('fullName');

    const ROLE_LABEL = {
      admin:        'Administrator',
      clinician:    'Klinitsist',
      receptionist: "Qabulxona bo'limi",
    };

    if (!token) window.location.href = 'login.html';

    document.getElementById('navFullName').textContent = fullName || '';
    document.getElementById('navRole').textContent     = ROLE_LABEL[role] || role;
    document.getElementById('greetName').textContent   = fullName || '';
    document.getElementById('greetRole').textContent   = ROLE_LABEL[role] || role;

    if (role === 'admin') {
      document.getElementById('navUsersLink').classList.remove('d-none');
    }

    function logout() {
      localStorage.clear();
      window.location.href = 'login.html';
    }

    async function authFetch(url) {
      const res = await fetch(url, {
        headers: { 'Authorization': 'Bearer ' + token },
      });
      if (res.status === 401) {
        localStorage.clear();
        window.location.href = 'login.html';
        return null;
      }
      return res;
    }

    async function loadStats() {
      const [resD, resP, resDi] = await Promise.all([
        authFetch('/api/doctors'),
        authFetch('/api/patients'),
        authFetch('/api/diagnoses'),
      ]);
      if (!resD || !resP || !resDi) return;
      const [doctors, patients, diagnoses] = await Promise.all([
        resD.json(), resP.json(), resDi.json(),
      ]);
      document.getElementById('countDoctors').textContent   = doctors.length;
      document.getElementById('countPatients').textContent  = patients.length;
      document.getElementById('countDiagnoses').textContent = diagnoses.length;
    }

    loadStats();
  </script>
</body>
</html>
