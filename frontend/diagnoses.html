<!DOCTYPE html>
<html lang="uz">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Tashxislar - CareTrack TYBT</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet" />
  <style>
    :root {
      --ct-primary:   #2B4FD8;
      --ct-secondary: #00BCD4;
      --ct-accent:    #7B8FD4;
      --ct-bg:        #B3EEF8;
      --ct-dark:      #1A2FA8;
      --bs-primary:         #2B4FD8;
      --bs-primary-rgb:     43,79,216;
      --bs-info:            #00BCD4;
      --bs-info-rgb:        0,188,212;
      --bs-link-color:      #2B4FD8;
      --bs-link-color-rgb:  43,79,216;
    }
    body { background: var(--ct-bg); }
    .navbar { background-color: var(--ct-primary) !important; box-shadow: 0 2px 14px rgba(43,79,216,.35); }
    .nav-link { border-radius: 7px; padding: .4rem .8rem !important; transition: background .15s; font-size: .9rem; }
    .nav-link:hover { background: rgba(255,255,255,.18); }
    .nav-active { background: rgba(255,255,255,.22) !important; font-weight: 600; }
    .card { border: none; border-radius: 14px; box-shadow: 0 2px 12px rgba(0,0,0,.07); }
    .card-header { border-radius: 14px 14px 0 0 !important; border-bottom: none; }
    .tbl-card { background: #fff; border-radius: 14px; box-shadow: 0 2px 12px rgba(0,0,0,.07); overflow: hidden; }
    .table { margin-bottom: 0; }
    .table thead th { font-size: .74rem; text-transform: uppercase; letter-spacing: .07em; padding: .8rem 1rem; border-bottom-width: 2px; }
    .table td { padding: .7rem 1rem; vertical-align: middle; }
    .page-top { background: #fff; border-radius: 14px; padding: 1.1rem 1.5rem; box-shadow: 0 2px 12px rgba(0,0,0,.07); margin-bottom: 1.25rem; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: .75rem; }
    .page-top h3 { margin: 0; font-weight: 700; font-size: 1.3rem; }
    .search-box { position: relative; margin-bottom: 1.25rem; }
    .search-box .bi-search { position: absolute; left: .9rem; top: 50%; transform: translateY(-50%); color: #adb5bd; pointer-events: none; }
    .search-box input { padding-left: 2.4rem; border-radius: 10px; border: 1.5px solid #dee2e6; }
    .search-box input:focus { border-color: var(--ct-primary); box-shadow: 0 0 0 3px rgba(43,79,216,.12); }
    .btn { border-radius: 8px; }
    .btn-sm { border-radius: 6px; font-size: .8rem; }
    .form-control, .form-select { border-radius: 8px; border: 1.5px solid #dee2e6; }
    .form-control:focus, .form-select:focus { border-color: var(--ct-primary); box-shadow: 0 0 0 3px rgba(43,79,216,.12); }
    .form-label { font-weight: 600; font-size: .875rem; margin-bottom: .35rem; }
    .modal-content { border: none; border-radius: 16px; box-shadow: 0 16px 48px rgba(0,0,0,.2); }
    .modal-header { border-radius: 16px 16px 0 0; padding: 1rem 1.5rem; }
    .modal-body { padding: 1.5rem; }
    .modal-footer { border-top: 1px solid #f0f0f0; padding: .85rem 1.5rem; }
    .badge { font-weight: 600; padding: .35em .65em; border-radius: 6px; }
    /* ICD autocomplete */
    .icd-wrap { position: relative; }
    .icd-dropdown {
      position: absolute; z-index: 1055;
      background: #fff; border: 1.5px solid #dee2e6;
      border-radius: 10px; max-height: 230px; overflow-y: auto;
      width: 100%; box-shadow: 0 8px 24px rgba(0,0,0,.12);
    }
    .icd-dropdown .icd-item {
      padding: 9px 14px; cursor: pointer;
      border-bottom: 1px solid #f3f3f3; font-size: .875rem;
      transition: background .1s;
    }
    .icd-dropdown .icd-item:last-child { border-bottom: none; }
    .icd-dropdown .icd-item:hover { background: rgba(43,79,216,.08); }
    .icd-dropdown .icd-code { font-weight: 700; color: var(--ct-primary); margin-right: 8px; }
    .bg-primary { background-color: var(--ct-primary) !important; }
    .text-primary { color: var(--ct-primary) !important; }
    .btn-primary { background-color: var(--ct-primary) !important; border-color: var(--ct-primary) !important; }
    .btn-primary:hover { background-color: var(--ct-dark) !important; border-color: var(--ct-dark) !important; }
    .btn-light.text-primary { color: var(--ct-primary) !important; }
    .alert-primary { background-color: rgba(43,79,216,.1); border-color: rgba(43,79,216,.25); color: var(--ct-dark); }
  </style>
</head>
<body>

  <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
    <div class="container">
      <a class="navbar-brand fw-bold d-flex align-items-center gap-2" href="dashboard.html">
        <i class="bi bi-heart-pulse-fill fs-5"></i> CareTrack TYBT
      </a>
      <button class="navbar-toggler border-0" type="button" data-bs-toggle="collapse" data-bs-target="#navMain">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="navMain">
        <ul class="navbar-nav ms-auto align-items-lg-center gap-lg-1 my-2 my-lg-0">
          <li class="nav-item"><a class="nav-link" href="dashboard.html"><i class="bi bi-speedometer2 me-1"></i>Bosh sahifa</a></li>
          <li class="nav-item"><a class="nav-link" href="doctors.html"><i class="bi bi-person-badge me-1"></i>Shifokorlar</a></li>
          <li class="nav-item"><a class="nav-link" href="patients.html"><i class="bi bi-people me-1"></i>Bemorlar</a></li>
          <li class="nav-item"><a class="nav-link nav-active" href="diagnoses.html"><i class="bi bi-clipboard2-pulse me-1"></i>Tashxislar</a></li>
          <li class="nav-item d-none" id="navUsersLink"><a class="nav-link" href="users.html"><i class="bi bi-person-gear me-1"></i>Xodimlar</a></li>
          <li class="nav-item"><a class="nav-link" href="my-profile.html"><i class="bi bi-person-circle me-1"></i>Mening hisobim</a></li>
        </ul>
        <div class="d-flex align-items-center gap-2 ms-lg-3 mt-2 mt-lg-0">
          <div class="text-white lh-sm border-start border-white border-opacity-25 ps-3">
            <div class="fw-bold small" id="navFullName"></div>
            <span class="badge bg-white bg-opacity-25 text-white" style="font-size:.7rem" id="navRole"></span>
          </div>
          <button class="btn btn-sm btn-light text-primary fw-semibold" onclick="logout()">
            <i class="bi bi-box-arrow-right me-1"></i>Chiqish
          </button>
        </div>
      </div>
    </div>
  </nav>

  <div class="container my-4">

    <div class="page-top">
      <h3><i class="bi bi-clipboard2-pulse text-warning me-2"></i>Tashxislar</h3>
      <button id="addDiagnosisBtn" class="btn btn-warning d-none"
        data-bs-toggle="modal" data-bs-target="#diagnosisModal" onclick="openAddForm()">
        <i class="bi bi-plus-lg me-1"></i>Yangi tashxis
      </button>
    </div>

    <div class="search-box">
      <i class="bi bi-search"></i>
      <input id="searchInput" class="form-control"
        placeholder="ICD kodi, kasallik nomi yoki tavsif bo'yicha qidirish..."
        oninput="renderTable()" />
    </div>

    <div class="tbl-card">
      <div class="table-responsive">
        <table class="table table-striped table-hover">
          <thead class="table-warning">
            <tr>
              <th><i class="bi bi-hash"></i></th>
              <th><i class="bi bi-upc me-1"></i>ICD Kodi</th>
              <th><i class="bi bi-virus me-1"></i>Kasallik nomi</th>
              <th><i class="bi bi-card-text me-1"></i>Tavsif</th>
              <th><i class="bi bi-bar-chart me-1"></i>Og'irlik</th>
              <th><i class="bi bi-calendar me-1"></i>Sana</th>
              <th><i class="bi bi-person me-1"></i>Bemor</th>
              <th><i class="bi bi-gear me-1"></i>Amallar</th>
            </tr>
          </thead>
          <tbody id="diagnosesTableBody"></tbody>
        </table>
      </div>
    </div>
  </div>

  <!-- Modal -->
  <div class="modal fade" id="diagnosisModal" tabindex="-1">
    <div class="modal-dialog modal-lg">
      <div class="modal-content">
        <div class="modal-header bg-warning">
          <h5 class="modal-title fw-semibold text-dark" id="modalTitle">
            <i class="bi bi-clipboard2-plus me-2"></i>Yangi tashxis
          </h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body">
          <input type="hidden" id="diagnosisId" />

          <!-- ICD qidiruv maydoni -->
          <div class="mb-3">
            <label class="form-label">
              <i class="bi bi-search me-1"></i>ICD Kodi *
              <span class="text-muted fw-normal small ms-1">(kod yoki kasallik nomini kiriting)</span>
            </label>
            <div class="icd-wrap">
              <input id="icdSearchInput" class="form-control"
                placeholder="Masalan: I10, Gipertoniya, J45..."
                autocomplete="off" oninput="onIcdInput()" onfocus="onIcdInput()" />
              <div id="icdDropdown" class="icd-dropdown d-none"></div>
            </div>
          </div>

          <!-- Tanlangan ICD ko'rsatish bloki -->
          <div id="icdSelectedBox" class="alert alert-primary align-items-center gap-2 py-2 px-3 mb-3 d-none small">
            <i class="bi bi-check-circle-fill"></i>
            <span><strong id="icdSelectedCode"></strong> — <span id="icdSelectedName"></span></span>
          </div>

          <!-- Saqlash uchun yashirin maydonlar -->
          <input type="hidden" id="icdCode" />
          <input type="hidden" id="diseaseName" />

          <div class="row">
            <div class="col-md-6 mb-3">
              <label class="form-label"><i class="bi bi-card-text me-1"></i>Tavsif (qo'shimcha izoh)</label>
              <input id="description" class="form-control" placeholder="Ixtiyoriy izoh..." />
            </div>
            <div class="col-md-6 mb-3">
              <label class="form-label"><i class="bi bi-bar-chart me-1"></i>Og'irlik darajasi</label>
              <select id="severity" class="form-select">
                <option value="mild">🟢 Yengil (mild)</option>
                <option value="moderate">🟡 O'rtacha (moderate)</option>
                <option value="severe">🔴 Og'ir (severe)</option>
              </select>
            </div>
          </div>
          <div class="row">
            <div class="col-md-6 mb-3">
              <label class="form-label"><i class="bi bi-calendar me-1"></i>Tashxis sanasi</label>
              <input id="diagnosedDate" type="date" class="form-control" />
            </div>
            <div class="col-md-6 mb-3">
              <label class="form-label"><i class="bi bi-person me-1"></i>Bemor *</label>
              <select id="patientId" class="form-select"></select>
            </div>
          </div>
        </div>
        <div class="modal-footer">
          <button class="btn btn-outline-secondary" data-bs-dismiss="modal">
            <i class="bi bi-x-lg me-1"></i>Bekor qilish
          </button>
          <button class="btn btn-warning" onclick="saveDiagnosis()">
            <i class="bi bi-check-lg me-1"></i>Saqlash
          </button>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script>
    const token    = localStorage.getItem('token');
    const role     = localStorage.getItem('role');
    const fullName = localStorage.getItem('fullName');

    const ROLE_LABEL = {
      admin: 'Administrator',
      clinician: 'Klinitsist',
      receptionist: "Qabulxona bo'limi"
    };
    const SEVERITY_LABEL = { mild: 'Yengil', moderate: "O'rtacha", severe: "Og'ir" };
    const SEVERITY_BADGE = { mild: 'success', moderate: 'warning', severe: 'danger' };

    if (!token) window.location.href = 'login.html';

    document.getElementById('navFullName').textContent = fullName || '';
    document.getElementById('navRole').textContent     = ROLE_LABEL[role] || role;

    if (role === 'admin' || role === 'clinician') {
      document.getElementById('addDiagnosisBtn').classList.remove('d-none');
    }
    if (role === 'admin') {
      document.getElementById('navUsersLink').classList.remove('d-none');
    }

    function logout() { localStorage.clear(); window.location.href = 'login.html'; }

    async function authFetch(url, options) {
      options = options || {};
      const headers = Object.assign(
        { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token },
        options.headers || {}
      );
      const res = await fetch(url, Object.assign({}, options, { headers: headers }));
      if (res.status === 401) { localStorage.clear(); window.location.href = 'login.html'; return null; }
      return res;
    }

    // ── ICD AUTOCOMPLETE ───────────────────────────────────────────────────

    let icdSearchTimer  = null;
    let currentIcdItems = []; // Joriy dropdown natijalari shu massivda saqlanadi

    async function onIcdInput() {
      const q = document.getElementById('icdSearchInput').value.trim();
      clearTimeout(icdSearchTimer);
      if (q.length < 1) { closeIcdDropdown(); return; }

      icdSearchTimer = setTimeout(async function () {
        const res = await authFetch('/api/icd?q=' + encodeURIComponent(q));
        if (!res) return;
        const items = await res.json();
        renderIcdDropdown(items);
      }, 200);
    }

    function renderIcdDropdown(items) {
      const dd = document.getElementById('icdDropdown');
      currentIcdItems = items; // Indeks orqali keyinchalik o'qish uchun saqlaymiz

      if (!items.length) { dd.classList.add('d-none'); return; }

      // HTML qurishda HECH QANDAY inline JS attributi ishlatmaymiz.
      // Matn xavfsiz ko'rsatish uchun HTML maxsus belgilarini escape qilamiz.
      var html = '';
      for (var i = 0; i < items.length; i++) {
        var it      = items[i];
        var codeEsc = String(it.code).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
        var nameEsc = String(it.name).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
        html += '<div class="icd-item" data-idx="' + i + '">'
              + '<span class="icd-code">' + codeEsc + '</span>' + nameEsc
              + '</div>';
      }
      dd.innerHTML = html;

      // Hodisalarni addEventListener orqali biriktiramiz —
      // inline onclick/onmousedown attributi ishlatmaslik sababi:
      // kasallik nomlari ichida qo'shtirnoq bo'lsa HTML attributi erta yopiladi
      // va "Uncaught SyntaxError: Unexpected end of input" xatosi beradi.
      //
      // mousedown ishlatish sababi: mousedown → blur → click tartibida sodir bo'ladi.
      // Agar click ishlatilsa, blur dropdown'ni yopib ulgurib qo'yadi.
      // e.preventDefault() esa blur'ni butunlay bloklaydi.
      var els = dd.querySelectorAll('.icd-item');
      els.forEach(function (el) {
        el.addEventListener('mousedown', function (e) {
          e.preventDefault(); // Blur'ni bloklash — dropdown yopilmaydi
          var idx    = parseInt(el.getAttribute('data-idx'), 10);
          var chosen = currentIcdItems[idx];
          if (chosen) selectIcd(chosen.code, chosen.name);
        });
      });

      dd.classList.remove('d-none');
    }

    function selectIcd(code, name) {
      document.getElementById('icdCode').value        = code;
      document.getElementById('diseaseName').value    = name;
      document.getElementById('description').value    = name;  // tavsifni avtomatik to'ldirish
      document.getElementById('icdSearchInput').value = code + ' — ' + name;

      document.getElementById('icdSelectedCode').textContent = code;
      document.getElementById('icdSelectedName').textContent = name;

      var box = document.getElementById('icdSelectedBox');
      box.classList.remove('d-none');
      box.classList.add('d-flex');

      closeIcdDropdown();
    }

    function closeIcdDropdown() {
      document.getElementById('icdDropdown').classList.add('d-none');
    }

    // Dropdown tashqarisiga bosilganda yopish
    document.addEventListener('click', function (e) {
      if (!e.target.closest('.icd-wrap')) closeIcdDropdown();
    });

    // ── TABLE ──────────────────────────────────────────────────────────────

    let allDiagnoses = [];
    let allPatients  = [];

    async function init() {
      const resP = await authFetch('/api/patients');
      if (!resP) return;
      allPatients = await resP.json();
      await loadDiagnoses();
    }

    async function loadDiagnoses() {
      const res = await authFetch('/api/diagnoses');
      if (!res) return;
      allDiagnoses = await res.json();
      renderTable();
    }

    // XSS oldini olish uchun HTML escape yordamchisi
    function esc(s) {
      return String(s == null ? '' : s)
        .replace(/&/g, '&amp;').replace(/</g, '&lt;')
        .replace(/>/g, '&gt;').replace(/"/g, '&quot;');
    }

    function renderTable() {
      const search   = document.getElementById('searchInput').value.toLowerCase();
      const tbody    = document.getElementById('diagnosesTableBody');
      const filtered = allDiagnoses.filter(function (d) {
        return d.icdCode.toLowerCase().includes(search)
          || (d.diseaseName || '').toLowerCase().includes(search)
          || (d.description || '').toLowerCase().includes(search);
      });

      var html = '';
      for (var i = 0; i < filtered.length; i++) {
        var d           = filtered[i];
        var patient     = allPatients.find(function (p) { return p.id === d.patientId; });
        var patientName = patient ? patient.fullName : '—';
        var badge       = SEVERITY_BADGE[d.severity] || 'secondary';
        var label       = SEVERITY_LABEL[d.severity] || d.severity;
        var canEdit     = role === 'admin' || role === 'clinician';
        var canDelete   = role === 'admin';

        var actions = '';
        if (canEdit)   actions += '<button class="btn btn-sm btn-warning" onclick="openEditForm(' + d.id + ')"><i class="bi bi-pencil me-1"></i>Tahrir</button>';
        if (canDelete) actions += ' <button class="btn btn-sm btn-danger ms-1" onclick="deleteDiagnosis(' + d.id + ')"><i class="bi bi-trash me-1"></i>O\'chirish</button>';
        if (!canEdit && !canDelete) actions = '<span class="text-muted small">—</span>';

        html += '<tr>'
              + '<td>' + d.id + '</td>'
              + '<td><strong class="text-primary">' + esc(d.icdCode) + '</strong></td>'
              + '<td>' + esc(d.diseaseName) + '</td>'
              + '<td>' + esc(d.description) + '</td>'
              + '<td><span class="badge bg-' + badge + '">' + label + '</span></td>'
              + '<td>' + esc(d.diagnosedDate) + '</td>'
              + '<td>' + esc(patientName) + '</td>'
              + '<td>' + actions + '</td>'
              + '</tr>';
      }
      tbody.innerHTML = html;
    }

    function fillPatientDropdown(selectedId) {
      const sel = document.getElementById('patientId');
      var html = '<option value="">— bemorni tanlang —</option>';
      for (var i = 0; i < allPatients.length; i++) {
        var p   = allPatients[i];
        var sel2 = (p.id === selectedId) ? ' selected' : '';
        html += '<option value="' + p.id + '"' + sel2 + '>' + esc(p.fullName) + '</option>';
      }
      sel.innerHTML = html;
    }

    function resetIcdFields() {
      document.getElementById('icdCode').value        = '';
      document.getElementById('diseaseName').value    = '';
      document.getElementById('icdSearchInput').value = '';
      var box = document.getElementById('icdSelectedBox');
      box.classList.add('d-none');
      box.classList.remove('d-flex');
      closeIcdDropdown();
    }

    function openAddForm() {
      document.getElementById('modalTitle').innerHTML = '<i class="bi bi-clipboard2-plus me-2"></i>Yangi tashxis';
      document.getElementById('diagnosisId').value   = '';
      resetIcdFields();
      document.getElementById('description').value   = '';
      document.getElementById('severity').value      = 'mild';
      document.getElementById('diagnosedDate').value = '';
      fillPatientDropdown(null);
    }

    function openEditForm(id) {
      const d = allDiagnoses.find(function (x) { return x.id === id; });
      if (!d) return;

      document.getElementById('modalTitle').innerHTML  = '<i class="bi bi-pencil me-2"></i>Tashxisni tahrirlash';
      document.getElementById('diagnosisId').value     = d.id;
      document.getElementById('icdCode').value         = d.icdCode;
      document.getElementById('diseaseName').value     = d.diseaseName || '';
      document.getElementById('icdSearchInput').value  = d.icdCode + (d.diseaseName ? ' — ' + d.diseaseName : '');

      var selBox = document.getElementById('icdSelectedBox');
      if (d.diseaseName) {
        document.getElementById('icdSelectedCode').textContent = d.icdCode;
        document.getElementById('icdSelectedName').textContent = d.diseaseName;
        selBox.classList.remove('d-none');
        selBox.classList.add('d-flex');
      } else {
        selBox.classList.add('d-none');
        selBox.classList.remove('d-flex');
      }

      document.getElementById('description').value   = d.description   || '';
      document.getElementById('severity').value      = d.severity      || 'mild';
      document.getElementById('diagnosedDate').value = d.diagnosedDate || '';
      fillPatientDropdown(d.patientId);
      new bootstrap.Modal(document.getElementById('diagnosisModal')).show();
    }

    async function saveDiagnosis() {
      const id        = document.getElementById('diagnosisId').value;
      const icdCode   = document.getElementById('icdCode').value.trim();
      const patientId = document.getElementById('patientId').value;

      if (!icdCode)   { alert('ICD kodi majburiy! Qidiruv maydonidan tanlang.'); return; }
      if (!patientId) { alert('Bemor tanlash majburiy!'); return; }

      const data = {
        icdCode:       icdCode,
        diseaseName:   document.getElementById('diseaseName').value.trim(),
        description:   document.getElementById('description').value.trim(),
        severity:      document.getElementById('severity').value,
        diagnosedDate: document.getElementById('diagnosedDate').value,
        patientId:     patientId
      };

      if (id) {
        await authFetch('/api/diagnoses/' + id, { method: 'PUT',  body: JSON.stringify(data) });
      } else {
        await authFetch('/api/diagnoses',        { method: 'POST', body: JSON.stringify(data) });
      }
      bootstrap.Modal.getInstance(document.getElementById('diagnosisModal')).hide();
      loadDiagnoses();
    }

    async function deleteDiagnosis(id) {
      if (!confirm("Rostdan o'chirilsinmi?")) return;
      await authFetch('/api/diagnoses/' + id, { method: 'DELETE' });
      loadDiagnoses();
    }

    init();
  </script>
</body>
</html>
