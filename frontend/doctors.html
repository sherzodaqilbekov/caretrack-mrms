<!DOCTYPE html>
<html lang="uz">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Shifokorlar - CareTrack TYBT</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet" />
  <style>
    :root {
      --ct-primary:   #2B4FD8;
      --ct-secondary: #00BCD4;
      --ct-accent:    #7B8FD4;
      --ct-bg:        #B3EEF8;
      --ct-dark:      #1A2FA8;
      --bs-primary:         #2B4FD8;
      --bs-primary-rgb:     43,79,216;
      --bs-info:            #00BCD4;
      --bs-info-rgb:        0,188,212;
      --bs-link-color:      #2B4FD8;
      --bs-link-color-rgb:  43,79,216;
    }
    body { background: var(--ct-bg); }
    .navbar { background-color: var(--ct-primary) !important; box-shadow: 0 2px 14px rgba(43,79,216,.35); }
    .nav-link { border-radius: 7px; padding: .4rem .8rem !important; transition: background .15s; font-size: .9rem; }
    .nav-link:hover { background: rgba(255,255,255,.18); }
    .nav-active { background: rgba(255,255,255,.22) !important; font-weight: 600; }
    .card { border: none; border-radius: 14px; box-shadow: 0 2px 12px rgba(0,0,0,.07); }
    .card-header { border-radius: 14px 14px 0 0 !important; border-bottom: none; }
    .tbl-card { background: #fff; border-radius: 14px; box-shadow: 0 2px 12px rgba(0,0,0,.07); overflow: hidden; }
    .table { margin-bottom: 0; }
    .table thead th { font-size: .74rem; text-transform: uppercase; letter-spacing: .07em; padding: .8rem 1rem; border-bottom-width: 2px; }
    .table td { padding: .7rem 1rem; vertical-align: middle; }
    .page-top { background: #fff; border-radius: 14px; padding: 1.1rem 1.5rem; box-shadow: 0 2px 12px rgba(0,0,0,.07); margin-bottom: 1.25rem; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: .75rem; }
    .page-top h3 { margin: 0; font-weight: 700; font-size: 1.3rem; }
    .search-box { position: relative; margin-bottom: 1.25rem; }
    .search-box .bi-search { position: absolute; left: .9rem; top: 50%; transform: translateY(-50%); color: #adb5bd; pointer-events: none; }
    .search-box input { padding-left: 2.4rem; border-radius: 10px; border: 1.5px solid #dee2e6; }
    .search-box input:focus { border-color: var(--ct-primary); box-shadow: 0 0 0 3px rgba(43,79,216,.12); }
    .btn { border-radius: 8px; }
    .btn-sm { border-radius: 6px; font-size: .8rem; }
    .form-control, .form-select { border-radius: 8px; border: 1.5px solid #dee2e6; }
    .form-control:focus, .form-select:focus { border-color: var(--ct-primary); box-shadow: 0 0 0 3px rgba(43,79,216,.12); }
    .form-label { font-weight: 600; font-size: .875rem; margin-bottom: .35rem; }
    .modal-content { border: none; border-radius: 16px; box-shadow: 0 16px 48px rgba(0,0,0,.2); }
    .modal-header { border-radius: 16px 16px 0 0; padding: 1rem 1.5rem; }
    .modal-body { padding: 1.5rem; }
    .modal-footer { border-top: 1px solid #f0f0f0; padding: .85rem 1.5rem; }
    .badge { font-weight: 600; padding: .35em .65em; border-radius: 6px; }
    .bg-primary { background-color: var(--ct-primary) !important; }
    .text-primary { color: var(--ct-primary) !important; }
    .btn-primary { background-color: var(--ct-primary) !important; border-color: var(--ct-primary) !important; }
    .btn-primary:hover { background-color: var(--ct-dark) !important; border-color: var(--ct-dark) !important; }
    .btn-light.text-primary { color: var(--ct-primary) !important; }
    .table-primary { --bs-table-bg: rgba(43,79,216,.1); --bs-table-striped-bg: rgba(43,79,216,.15); }
    .badge.bg-primary { background-color: var(--ct-primary) !important; }
  </style>
</head>
<body>

  <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
    <div class="container">
      <a class="navbar-brand fw-bold d-flex align-items-center gap-2" href="dashboard.html">
        <i class="bi bi-heart-pulse-fill fs-5"></i> CareTrack TYBT
      </a>
      <button class="navbar-toggler border-0" type="button" data-bs-toggle="collapse" data-bs-target="#navMain">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="navMain">
        <ul class="navbar-nav ms-auto align-items-lg-center gap-lg-1 my-2 my-lg-0">
          <li class="nav-item">
            <a class="nav-link" href="dashboard.html"><i class="bi bi-speedometer2 me-1"></i>Bosh sahifa</a>
          </li>
          <li class="nav-item">
            <a class="nav-link nav-active" href="doctors.html"><i class="bi bi-person-badge me-1"></i>Shifokorlar</a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="patients.html"><i class="bi bi-people me-1"></i>Bemorlar</a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="diagnoses.html"><i class="bi bi-clipboard2-pulse me-1"></i>Tashxislar</a>
          </li>
          <li class="nav-item d-none" id="navUsersLink">
            <a class="nav-link" href="users.html"><i class="bi bi-person-gear me-1"></i>Xodimlar</a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="my-profile.html"><i class="bi bi-person-circle me-1"></i>Mening hisobim</a>
          </li>
        </ul>
        <div class="d-flex align-items-center gap-2 ms-lg-3 mt-2 mt-lg-0">
          <div class="text-white lh-sm border-start border-white border-opacity-25 ps-3">
            <div class="fw-bold small" id="navFullName"></div>
            <span class="badge bg-white bg-opacity-25 text-white" style="font-size:.7rem" id="navRole"></span>
          </div>
          <button class="btn btn-sm btn-light text-primary fw-semibold" onclick="logout()">
            <i class="bi bi-box-arrow-right me-1"></i>Chiqish
          </button>
        </div>
      </div>
    </div>
  </nav>

  <div class="container my-4">

    <!-- Page header -->
    <div class="page-top">
      <h3><i class="bi bi-person-badge text-primary me-2"></i>Shifokorlar</h3>
      <button id="addDoctorBtn" class="btn btn-success d-none"
        data-bs-toggle="modal" data-bs-target="#doctorModal" onclick="openAddForm()">
        <i class="bi bi-plus-lg me-1"></i>Yangi shifokor
      </button>
    </div>

    <!-- Search -->
    <div class="search-box">
      <i class="bi bi-search"></i>
      <input id="searchInput" class="form-control"
        placeholder="Ism yoki mutaxassislik bo'yicha qidirish..." oninput="renderTable()" />
    </div>

    <!-- Table -->
    <div class="tbl-card">
      <div class="table-responsive">
        <table class="table table-striped table-hover">
          <thead class="table-primary">
            <tr>
              <th><i class="bi bi-hash"></i></th>
              <th><i class="bi bi-person me-1"></i>To'liq ism</th>
              <th><i class="bi bi-briefcase me-1"></i>Mutaxassislik</th>
              <th><i class="bi bi-building me-1"></i>Bo'lim</th>
              <th><i class="bi bi-envelope me-1"></i>Email</th>
              <th><i class="bi bi-telephone me-1"></i>Telefon</th>
              <th><i class="bi bi-gear me-1"></i>Amallar</th>
            </tr>
          </thead>
          <tbody id="doctorsTableBody"></tbody>
        </table>
      </div>
    </div>
  </div>

  <!-- Modal -->
  <div class="modal fade" id="doctorModal" tabindex="-1">
    <div class="modal-dialog">
      <div class="modal-content">
        <div class="modal-header bg-primary text-white">
          <h5 class="modal-title fw-semibold" id="modalTitle">
            <i class="bi bi-person-plus me-2"></i>Yangi shifokor
          </h5>
          <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body">
          <input type="hidden" id="doctorId" />
          <div class="mb-3">
            <label class="form-label">To'liq ism *</label>
            <input id="fullName" class="form-control" placeholder="Masalan: Dr. Ali Valiyev" />
          </div>
          <div class="mb-3">
            <label class="form-label">Mutaxassislik *</label>
            <input id="specialty" class="form-control" placeholder="Masalan: Kardiologiya" />
          </div>
          <div class="mb-3">
            <label class="form-label">Bo'lim</label>
            <input id="department" class="form-control" placeholder="Masalan: Yurak bo'limi" />
          </div>
          <div class="row">
            <div class="col-sm-6 mb-3">
              <label class="form-label">Email</label>
              <input id="docEmail" class="form-control" placeholder="doktor@caretrack.uz" />
            </div>
            <div class="col-sm-6 mb-3">
              <label class="form-label">Telefon</label>
              <input id="phone" class="form-control" placeholder="+998 XX XXX XX XX" />
            </div>
          </div>
        </div>
        <div class="modal-footer">
          <button class="btn btn-outline-secondary" data-bs-dismiss="modal">
            <i class="bi bi-x-lg me-1"></i>Bekor qilish
          </button>
          <button class="btn btn-primary" onclick="saveDoctor()">
            <i class="bi bi-check-lg me-1"></i>Saqlash
          </button>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script>
    const token    = localStorage.getItem('token');
    const role     = localStorage.getItem('role');
    const fullName = localStorage.getItem('fullName');

    const ROLE_LABEL = {
      admin: 'Administrator', clinician: 'Klinitsist', receptionist: "Qabulxona bo'limi",
    };

    if (!token) window.location.href = 'login.html';

    document.getElementById('navFullName').textContent = fullName || '';
    document.getElementById('navRole').textContent     = ROLE_LABEL[role] || role;
    if (role === 'admin') {
      document.getElementById('addDoctorBtn').classList.remove('d-none');
      document.getElementById('navUsersLink').classList.remove('d-none');
    }

    function logout() { localStorage.clear(); window.location.href = 'login.html'; }

    async function authFetch(url, options = {}) {
      const res = await fetch(url, {
        ...options,
        headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token, ...(options.headers || {}) },
      });
      if (res.status === 401) { localStorage.clear(); window.location.href = 'login.html'; return null; }
      return res;
    }

    let allDoctors = [];

    async function loadDoctors() {
      const res = await authFetch('/api/doctors');
      if (!res) return;
      allDoctors = await res.json();
      renderTable();
    }

    function renderTable() {
      const search = document.getElementById('searchInput').value.toLowerCase();
      const tbody  = document.getElementById('doctorsTableBody');
      const filtered = allDoctors.filter(d =>
        d.fullName.toLowerCase().includes(search) ||
        (d.specialty || '').toLowerCase().includes(search)
      );
      tbody.innerHTML = filtered.map(d => `
        <tr>
          <td>${d.id}</td><td>${d.fullName}</td><td>${d.specialty || ''}</td>
          <td>${d.department || ''}</td><td>${d.email || ''}</td><td>${d.phone || ''}</td>
          <td>
            ${role === 'admin' ? `
              <button class="btn btn-sm btn-warning" onclick="openEditForm(${d.id})"><i class="bi bi-pencil me-1"></i>Tahrir</button>
              <button class="btn btn-sm btn-danger ms-1" onclick="deleteDoctor(${d.id})"><i class="bi bi-trash me-1"></i>O'chirish</button>
            ` : '<span class="text-muted small">—</span>'}
          </td>
        </tr>`).join('');
    }

    function openAddForm() {
      document.getElementById('modalTitle').innerHTML = '<i class="bi bi-person-plus me-2"></i>Yangi shifokor';
      document.getElementById('doctorId').value = '';
      ['fullName','specialty','department','docEmail','phone'].forEach(id => document.getElementById(id).value = '');
    }

    function openEditForm(id) {
      const d = allDoctors.find(x => x.id === id);
      document.getElementById('modalTitle').innerHTML = '<i class="bi bi-pencil me-2"></i>Shifokorni tahrirlash';
      document.getElementById('doctorId').value   = d.id;
      document.getElementById('fullName').value   = d.fullName;
      document.getElementById('specialty').value  = d.specialty  || '';
      document.getElementById('department').value = d.department || '';
      document.getElementById('docEmail').value   = d.email      || '';
      document.getElementById('phone').value      = d.phone      || '';
      new bootstrap.Modal(document.getElementById('doctorModal')).show();
    }

    async function saveDoctor() {
      const id   = document.getElementById('doctorId').value;
      const data = {
        fullName:   document.getElementById('fullName').value.trim(),
        specialty:  document.getElementById('specialty').value.trim(),
        department: document.getElementById('department').value.trim(),
        email:      document.getElementById('docEmail').value.trim(),
        phone:      document.getElementById('phone').value.trim(),
      };
      if (!data.fullName || !data.specialty) { alert('Ism va mutaxassislik majburiy!'); return; }
      if (id) {
        await authFetch('/api/doctors/' + id, { method: 'PUT', body: JSON.stringify(data) });
      } else {
        await authFetch('/api/doctors', { method: 'POST', body: JSON.stringify(data) });
      }
      bootstrap.Modal.getInstance(document.getElementById('doctorModal')).hide();
      loadDoctors();
    }

    async function deleteDoctor(id) {
      if (!confirm("Rostdan o'chirilsinmi?")) return;
      await authFetch('/api/doctors/' + id, { method: 'DELETE' });
      loadDoctors();
    }

    loadDoctors();
  </script>
</body>
</html>
