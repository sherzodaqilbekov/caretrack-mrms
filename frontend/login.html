<!DOCTYPE html>
<html lang="uz">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Kirish - CareTrack TYBT</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet" />
  <style>
    body {
      background: linear-gradient(135deg, #1a6efd 0%, #0a4bbf 50%, #093a9e 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1rem;
    }
    .login-card {
      width: 100%;
      max-width: 440px;
      border: none;
      border-radius: 20px;
      box-shadow: 0 24px 64px rgba(0,0,0,.3);
      overflow: hidden;
    }
    .login-header {
      background: linear-gradient(135deg, #0d6efd, #0a58ca);
      padding: 2rem 2rem 1.5rem;
      text-align: center;
      color: #fff;
    }
    .login-header .logo-icon {
      width: 64px; height: 64px;
      background: rgba(255,255,255,.2);
      border-radius: 16px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      font-size: 2rem;
      margin-bottom: .75rem;
    }
    .login-body { padding: 2rem; }
    .form-control {
      border-radius: 10px;
      padding: .65rem 1rem;
      border: 1.5px solid #dee2e6;
      transition: border-color .15s, box-shadow .15s;
    }
    .form-control:focus { border-color: #0d6efd; box-shadow: 0 0 0 3px rgba(13,110,253,.15); }
    .input-group-text {
      border-radius: 10px 0 0 10px;
      background: #f8f9fa;
      border: 1.5px solid #dee2e6;
      border-right: none;
      color: #6c757d;
    }
    .input-group .form-control { border-radius: 0 10px 10px 0; border-left: none; }
    .btn-login {
      border-radius: 10px;
      padding: .7rem;
      font-size: 1rem;
      font-weight: 600;
      letter-spacing: .02em;
    }
    .hint-box {
      background: #f8f9ff;
      border: 1px solid #d0deff;
      border-radius: 10px;
      padding: .85rem 1rem;
    }
    .hint-box .hint-title {
      font-size: .78rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: .06em;
      color: #6c757d;
      margin-bottom: .5rem;
    }
    .hint-item {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: .3rem 0;
      border-bottom: 1px dashed #e3eaff;
      font-size: .82rem;
    }
    .hint-item:last-child { border-bottom: none; }
  </style>
</head>
<body>

  <div class="login-card card">
    <div class="login-header">
      <div class="logo-icon"><i class="bi bi-heart-pulse-fill"></i></div>
      <h4 class="fw-bold mb-0">CareTrack TYBT</h4>
      <div class="opacity-75 small mt-1">Tibbiy Yozuvlarni Boshqarish Tizimi</div>
    </div>

    <div class="login-body">
      <div id="errorMsg" class="alert alert-danger d-flex align-items-center gap-2 d-none py-2">
        <i class="bi bi-exclamation-circle-fill"></i>
        <span id="errorText"></span>
      </div>

      <div class="mb-3">
        <label class="form-label fw-semibold text-secondary small">ELEKTRON POCHTA</label>
        <div class="input-group">
          <span class="input-group-text"><i class="bi bi-envelope"></i></span>
          <input id="email" type="email" class="form-control"
                 placeholder="email@caretrack.uz"
                 onkeydown="if(event.key==='Enter') login()" />
        </div>
      </div>

      <div class="mb-4">
        <label class="form-label fw-semibold text-secondary small">PAROL</label>
        <div class="input-group">
          <span class="input-group-text"><i class="bi bi-lock"></i></span>
          <input id="password" type="password" class="form-control"
                 placeholder="••••••••"
                 onkeydown="if(event.key==='Enter') login()" />
        </div>
      </div>

      <button class="btn btn-primary w-100 btn-login" onclick="login()">
        <i class="bi bi-box-arrow-in-right me-2"></i>Tizimga kirish
      </button>

      <hr class="my-4 text-secondary" />

      <div class="hint-box">
        <div class="hint-title"><i class="bi bi-info-circle me-1"></i>Sinov hisob ma'lumotlari</div>
        <div class="hint-item">
          <span><strong>admin@caretrack.uz</strong> / admin123</span>
          <span class="badge bg-danger">Admin</span>
        </div>
        <div class="hint-item">
          <span><strong>klinik@caretrack.uz</strong> / klinik123</span>
          <span class="badge bg-primary">Klinitsist</span>
        </div>
        <div class="hint-item">
          <span><strong>klinik2@caretrack.uz</strong> / klinik2123</span>
          <span class="badge bg-primary">Klinitsist</span>
        </div>
        <div class="hint-item">
          <span><strong>qabul@caretrack.uz</strong> / qabul123</span>
          <span class="badge bg-success">Qabulxona</span>
        </div>
        <div class="hint-item">
          <span><strong>qabul2@caretrack.uz</strong> / qabul2123</span>
          <span class="badge bg-success">Qabulxona</span>
        </div>
      </div>
    </div>
  </div>

  <script>
    if (localStorage.getItem('token')) {
      window.location.href = 'dashboard.html';
    }

    async function login() {
      const email    = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      const errorDiv = document.getElementById('errorMsg');
      const errorText = document.getElementById('errorText');

      errorDiv.classList.add('d-none');

      if (!email || !password) {
        errorText.textContent = 'Elektron pochta va parol kiritish shart!';
        errorDiv.classList.remove('d-none');
        return;
      }

      const res  = await fetch('/api/auth/login', {
        method:  'POST',
        headers: { 'Content-Type': 'application/json' },
        body:    JSON.stringify({ email, password }),
      });

      const data = await res.json();

      if (!res.ok) {
        errorText.textContent = data.error || 'Kirish amalga oshmadi';
        errorDiv.classList.remove('d-none');
        return;
      }

      localStorage.setItem('token',    data.token);
      localStorage.setItem('fullName', data.fullName);
      localStorage.setItem('email',    data.email);
      localStorage.setItem('role',     data.role);

      window.location.href = 'dashboard.html';
    }
  </script>
</body>
</html>
