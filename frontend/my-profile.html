<!DOCTYPE html>
<html lang="uz">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mening hisobim - CareTrack TYBT</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet" />
  <style>
    :root {
      --ct-primary:   #2B4FD8;
      --ct-secondary: #00BCD4;
      --ct-accent:    #7B8FD4;
      --ct-bg:        #B3EEF8;
      --ct-dark:      #1A2FA8;
      --bs-primary:         #2B4FD8;
      --bs-primary-rgb:     43,79,216;
      --bs-info:            #00BCD4;
      --bs-info-rgb:        0,188,212;
      --bs-link-color:      #2B4FD8;
      --bs-link-color-rgb:  43,79,216;
    }
    body { background: var(--ct-bg); }
    .navbar { background-color: var(--ct-primary) !important; box-shadow: 0 2px 14px rgba(43,79,216,.35); }
    .nav-link { border-radius: 7px; padding: .4rem .8rem !important; transition: background .15s; font-size: .9rem; }
    .nav-link:hover { background: rgba(255,255,255,.18); }
    .nav-active { background: rgba(255,255,255,.22) !important; font-weight: 600; }
    .card { border: none; border-radius: 14px; box-shadow: 0 2px 12px rgba(0,0,0,.07); }
    .card-header { border-radius: 14px 14px 0 0 !important; border-bottom: none; padding: .9rem 1.4rem; }
    .btn { border-radius: 8px; }
    .form-control { border-radius: 8px; border: 1.5px solid #dee2e6; }
    .form-control:focus { border-color: var(--ct-primary); box-shadow: 0 0 0 3px rgba(43,79,216,.12); }
    .form-label { font-weight: 600; font-size: .875rem; margin-bottom: .35rem; }
    .badge { font-weight: 600; padding: .35em .65em; border-radius: 6px; }
    /* Avatar banner */
    .profile-banner {
      background: linear-gradient(135deg, var(--ct-primary) 0%, var(--ct-dark) 100%);
      border-radius: 14px; color: #fff;
      padding: 1.75rem 2rem;
      box-shadow: 0 8px 24px rgba(43,79,216,.3);
      margin-bottom: 1.5rem;
      display: flex; align-items: center; gap: 1.25rem;
    }
    .profile-avatar {
      width: 72px; height: 72px; border-radius: 50%;
      background: rgba(255,255,255,.2);
      display: flex; align-items: center; justify-content: center;
      font-size: 2rem; flex-shrink: 0;
      border: 3px solid rgba(255,255,255,.3);
    }
    /* Info rows */
    .info-row {
      display: flex; align-items: center;
      padding: .85rem 0;
      border-bottom: 1px solid #f3f4f6;
    }
    .info-row:last-child { border-bottom: none; }
    .info-row-icon {
      width: 36px; height: 36px; border-radius: 9px;
      display: flex; align-items: center; justify-content: center;
      font-size: 1rem; flex-shrink: 0; margin-right: 1rem;
    }
    .info-row-label { font-size: .78rem; color: #6c757d; margin-bottom: .1rem; }
    .info-row-value { font-weight: 600; color: #212529; }
    .bg-primary { background-color: var(--ct-primary) !important; }
    .text-primary { color: var(--ct-primary) !important; }
    .btn-primary { background-color: var(--ct-primary) !important; border-color: var(--ct-primary) !important; }
    .btn-primary:hover { background-color: var(--ct-dark) !important; border-color: var(--ct-dark) !important; }
    .btn-light.text-primary { color: var(--ct-primary) !important; }
    /* info-row icon ranglarini moslash */
    .info-row-icon.bg-primary.bg-opacity-10 { background-color: rgba(43,79,216,.1) !important; }
    .info-row-icon.bg-info.bg-opacity-10 { background-color: rgba(0,188,212,.1) !important; }
    .text-info { color: var(--ct-secondary) !important; }
  </style>
</head>
<body>

  <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
    <div class="container">
      <a class="navbar-brand fw-bold d-flex align-items-center gap-2" href="dashboard.html">
        <i class="bi bi-heart-pulse-fill fs-5"></i> CareTrack TYBT
      </a>
      <button class="navbar-toggler border-0" type="button" data-bs-toggle="collapse" data-bs-target="#navMain">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="navMain">
        <ul class="navbar-nav ms-auto align-items-lg-center gap-lg-1 my-2 my-lg-0">
          <li class="nav-item">
            <a class="nav-link" href="dashboard.html"><i class="bi bi-speedometer2 me-1"></i>Bosh sahifa</a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="doctors.html"><i class="bi bi-person-badge me-1"></i>Shifokorlar</a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="patients.html"><i class="bi bi-people me-1"></i>Bemorlar</a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="diagnoses.html"><i class="bi bi-clipboard2-pulse me-1"></i>Tashxislar</a>
          </li>
          <li class="nav-item d-none" id="navUsersLink">
            <a class="nav-link" href="users.html"><i class="bi bi-person-gear me-1"></i>Xodimlar</a>
          </li>
          <li class="nav-item">
            <a class="nav-link nav-active" href="my-profile.html"><i class="bi bi-person-circle me-1"></i>Mening hisobim</a>
          </li>
        </ul>
        <div class="d-flex align-items-center gap-2 ms-lg-3 mt-2 mt-lg-0">
          <div class="text-white lh-sm border-start border-white border-opacity-25 ps-3">
            <div class="fw-bold small" id="navFullName"></div>
            <span class="badge bg-white bg-opacity-25 text-white" style="font-size:.7rem" id="navRole"></span>
          </div>
          <button class="btn btn-sm btn-light text-primary fw-semibold" onclick="logout()">
            <i class="bi bi-box-arrow-right me-1"></i>Chiqish
          </button>
        </div>
      </div>
    </div>
  </nav>

  <div class="container my-4" style="max-width: 620px;">

    <!-- Profile banner -->
    <div class="profile-banner">
      <div class="profile-avatar"><i class="bi bi-person-fill"></i></div>
      <div>
        <div class="opacity-75 small text-uppercase" style="letter-spacing:.06em">Mening hisobim</div>
        <h4 class="fw-bold mb-0 mt-1" id="profileFullName">—</h4>
        <div class="mt-1">
          <span class="badge bg-white bg-opacity-25 text-white" id="profileRole">—</span>
        </div>
      </div>
    </div>

    <!-- Profile info card -->
    <div class="card mb-3">
      <div class="card-header bg-primary text-white d-flex align-items-center gap-2">
        <i class="bi bi-person-lines-fill"></i>
        <h6 class="mb-0 fw-semibold">Shaxsiy ma'lumotlar</h6>
      </div>
      <div class="card-body px-4 py-2">
        <div class="info-row">
          <div class="info-row-icon bg-primary bg-opacity-10 text-primary">
            <i class="bi bi-person"></i>
          </div>
          <div>
            <div class="info-row-label">To'liq ism</div>
            <div class="info-row-value" id="infoFullName">—</div>
          </div>
        </div>
        <div class="info-row">
          <div class="info-row-icon bg-info bg-opacity-10 text-info">
            <i class="bi bi-envelope"></i>
          </div>
          <div>
            <div class="info-row-label">Elektron pochta</div>
            <div class="info-row-value" id="profileEmail">—</div>
          </div>
        </div>
        <div class="info-row">
          <div class="info-row-icon bg-success bg-opacity-10 text-success">
            <i class="bi bi-shield-check"></i>
          </div>
          <div>
            <div class="info-row-label">Rol</div>
            <div class="info-row-value" id="infoRole">—</div>
          </div>
        </div>
        <div class="info-row">
          <div class="info-row-icon bg-secondary bg-opacity-10 text-secondary">
            <i class="bi bi-hash"></i>
          </div>
          <div>
            <div class="info-row-label">Hisob ID</div>
            <div class="info-row-value text-muted" id="profileId">—</div>
          </div>
        </div>
      </div>
    </div>

    <!-- Password change card -->
    <div class="card">
      <div class="card-header bg-warning d-flex align-items-center gap-2">
        <i class="bi bi-key-fill"></i>
        <h6 class="mb-0 fw-semibold">Parolni o'zgartirish</h6>
      </div>
      <div class="card-body p-4">
        <div id="passwordAlert" class="alert d-flex align-items-center gap-2 d-none py-2">
          <i class="bi bi-info-circle-fill"></i><span></span>
        </div>
        <div class="mb-3">
          <label class="form-label"><i class="bi bi-lock me-1"></i>Joriy parol</label>
          <input type="password" id="currentPassword" class="form-control"
            placeholder="Hozirgi parolingizni kiriting" />
        </div>
        <div class="mb-3">
          <label class="form-label"><i class="bi bi-key me-1"></i>Yangi parol</label>
          <input type="password" id="newPassword" class="form-control"
            placeholder="Yangi parol (kamida 6 ta belgi)" />
        </div>
        <div class="mb-4">
          <label class="form-label"><i class="bi bi-key-fill me-1"></i>Yangi parolni tasdiqlang</label>
          <input type="password" id="confirmPassword" class="form-control"
            placeholder="Yangi parolni qayta kiriting" />
        </div>
        <button class="btn btn-warning fw-semibold px-4" onclick="changePassword()">
          <i class="bi bi-check-lg me-1"></i>Parolni yangilash
        </button>
      </div>
    </div>

  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script>
    const token    = localStorage.getItem('token');
    const role     = localStorage.getItem('role');
    const fullName = localStorage.getItem('fullName');

    const ROLE_LABEL = {
      admin: 'Administrator', clinician: 'Klinitsist', receptionist: "Qabulxona bo'limi",
    };

    // Kirish tekshiruvi
    if (!token) window.location.href = 'login.html';

    // Navbar to'ldirish
    document.getElementById('navFullName').textContent = fullName || '';
    document.getElementById('navRole').textContent     = ROLE_LABEL[role] || role;
    if (role === 'admin') {
      document.getElementById('navUsersLink').classList.remove('d-none');
    }

    function logout() { localStorage.clear(); window.location.href = 'login.html'; }

    async function authFetch(url, options = {}) {
      const res = await fetch(url, {
        ...options,
        headers: {
          'Content-Type': 'application/json',
          'Authorization': 'Bearer ' + token,
          ...(options.headers || {}),
        },
      });
      if (res.status === 401) { localStorage.clear(); window.location.href = 'login.html'; return null; }
      return res;
    }

    // Profil ma'lumotlarini yuklash
    async function loadProfile() {
      const res = await authFetch('/api/users/me');
      if (!res) return;

      if (!res.ok) {
        document.getElementById('profileFullName').textContent = 'Xatolik yuz berdi';
        return;
      }

      const user = await res.json();
      const roleText = ROLE_LABEL[user.role] || user.role || '—';
      document.getElementById('profileFullName').textContent = user.fullName || '—';
      document.getElementById('infoFullName').textContent    = user.fullName || '—';
      document.getElementById('profileEmail').textContent    = user.email    || '—';
      document.getElementById('profileRole').textContent     = roleText;
      document.getElementById('infoRole').textContent        = roleText;
      document.getElementById('profileId').textContent       = '#' + user.id;
    }

    // Parol o'zgartirish
    async function changePassword() {
      const currentPassword = document.getElementById('currentPassword').value.trim();
      const newPassword     = document.getElementById('newPassword').value.trim();
      const confirmPassword = document.getElementById('confirmPassword').value.trim();
      const alertBox        = document.getElementById('passwordAlert');

      // Validatsiya
      if (!currentPassword || !newPassword || !confirmPassword) {
        showAlert('danger', 'Barcha parol maydonlarini to\'ldiring!');
        return;
      }
      if (newPassword.length < 6) {
        showAlert('danger', 'Yangi parol kamida 6 ta belgidan iborat bo\'lishi kerak!');
        return;
      }
      if (newPassword !== confirmPassword) {
        showAlert('danger', 'Yangi parol va tasdiqlash mos kelmayapti!');
        return;
      }

      const res = await authFetch('/api/users/me/password', {
        method: 'PUT',
        body: JSON.stringify({ currentPassword, newPassword }),
      });
      if (!res) return;

      const data = await res.json();
      if (!res.ok) {
        showAlert('danger', data.error || 'Xatolik yuz berdi');
        return;
      }

      showAlert('success', 'Parol muvaffaqiyatli o\'zgartirildi!');
      // Maydonlarni tozalash
      document.getElementById('currentPassword').value = '';
      document.getElementById('newPassword').value     = '';
      document.getElementById('confirmPassword').value = '';
    }

    function showAlert(type, message) {
      const alertBox = document.getElementById('passwordAlert');
      const icon = type === 'success' ? 'bi-check-circle-fill' : 'bi-exclamation-circle-fill';
      alertBox.className  = 'alert alert-' + type + ' d-flex align-items-center gap-2 py-2';
      alertBox.innerHTML  = `<i class="bi ${icon}"></i><span>${message}</span>`;
      // 5 soniyadan keyin yashirish
      setTimeout(() => alertBox.className = 'alert d-none', 5000);
    }

    loadProfile();
  </script>
</body>
</html>
