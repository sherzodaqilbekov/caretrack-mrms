<!DOCTYPE html>
<html lang="uz">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Xodimlar - CareTrack TYBT</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet" />
  <style>
    body { background: #eef2f7; }
    .navbar { box-shadow: 0 2px 14px rgba(13,110,253,.25); }
    .nav-link { border-radius: 7px; padding: .4rem .8rem !important; transition: background .15s; font-size: .9rem; }
    .nav-link:hover { background: rgba(255,255,255,.18); }
    .nav-active { background: rgba(255,255,255,.22) !important; font-weight: 600; }
    .card { border: none; border-radius: 14px; box-shadow: 0 2px 12px rgba(0,0,0,.07); }
    .card-header { border-radius: 14px 14px 0 0 !important; border-bottom: none; }
    .tbl-card { background: #fff; border-radius: 14px; box-shadow: 0 2px 12px rgba(0,0,0,.07); overflow: hidden; }
    .table { margin-bottom: 0; }
    .table thead th { font-size: .74rem; text-transform: uppercase; letter-spacing: .07em; padding: .8rem 1rem; border-bottom-width: 2px; }
    .table td { padding: .7rem 1rem; vertical-align: middle; }
    .page-top { background: #fff; border-radius: 14px; padding: 1.1rem 1.5rem; box-shadow: 0 2px 12px rgba(0,0,0,.07); margin-bottom: 1.25rem; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: .75rem; }
    .page-top h3 { margin: 0; font-weight: 700; font-size: 1.3rem; }
    .search-box { position: relative; margin-bottom: 1.25rem; }
    .search-box .bi-search { position: absolute; left: .9rem; top: 50%; transform: translateY(-50%); color: #adb5bd; pointer-events: none; }
    .search-box input { padding-left: 2.4rem; border-radius: 10px; border: 1.5px solid #dee2e6; }
    .search-box input:focus { border-color: #0d6efd; box-shadow: 0 0 0 3px rgba(13,110,253,.12); }
    .btn { border-radius: 8px; }
    .btn-sm { border-radius: 6px; font-size: .8rem; }
    .form-control, .form-select { border-radius: 8px; border: 1.5px solid #dee2e6; }
    .form-control:focus, .form-select:focus { border-color: #0d6efd; box-shadow: 0 0 0 3px rgba(13,110,253,.12); }
    .form-label { font-weight: 600; font-size: .875rem; margin-bottom: .35rem; }
    .modal-content { border: none; border-radius: 16px; box-shadow: 0 16px 48px rgba(0,0,0,.2); }
    .modal-header { border-radius: 16px 16px 0 0; padding: 1rem 1.5rem; }
    .modal-body { padding: 1.5rem; }
    .modal-footer { border-top: 1px solid #f0f0f0; padding: .85rem 1.5rem; }
    .badge { font-weight: 600; padding: .35em .65em; border-radius: 6px; }
    /* Admin notice banner */
    .admin-notice {
      background: linear-gradient(135deg, #212529, #343a40);
      color: #fff; border-radius: 14px;
      padding: 1.1rem 1.5rem;
      display: flex; align-items: center; gap: .75rem;
      margin-bottom: 1.25rem;
      box-shadow: 0 4px 16px rgba(0,0,0,.18);
    }
  </style>
</head>
<body>

  <nav class="navbar navbar-expand-lg navbar-dark bg-primary">
    <div class="container">
      <a class="navbar-brand fw-bold d-flex align-items-center gap-2" href="dashboard.html">
        <i class="bi bi-heart-pulse-fill fs-5"></i> CareTrack TYBT
      </a>
      <button class="navbar-toggler border-0" type="button" data-bs-toggle="collapse" data-bs-target="#navMain">
        <span class="navbar-toggler-icon"></span>
      </button>
      <div class="collapse navbar-collapse" id="navMain">
        <ul class="navbar-nav ms-auto align-items-lg-center gap-lg-1 my-2 my-lg-0">
          <li class="nav-item">
            <a class="nav-link" href="dashboard.html"><i class="bi bi-speedometer2 me-1"></i>Bosh sahifa</a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="doctors.html"><i class="bi bi-person-badge me-1"></i>Shifokorlar</a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="patients.html"><i class="bi bi-people me-1"></i>Bemorlar</a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="diagnoses.html"><i class="bi bi-clipboard2-pulse me-1"></i>Tashxislar</a>
          </li>
          <li class="nav-item">
            <a class="nav-link nav-active" href="users.html"><i class="bi bi-person-gear me-1"></i>Xodimlar</a>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="my-profile.html"><i class="bi bi-person-circle me-1"></i>Mening hisobim</a>
          </li>
        </ul>
        <div class="d-flex align-items-center gap-2 ms-lg-3 mt-2 mt-lg-0">
          <div class="text-white lh-sm border-start border-white border-opacity-25 ps-3">
            <div class="fw-bold small" id="navFullName"></div>
            <span class="badge bg-white bg-opacity-25 text-white" style="font-size:.7rem" id="navRole"></span>
          </div>
          <button class="btn btn-sm btn-light text-primary fw-semibold" onclick="logout()">
            <i class="bi bi-box-arrow-right me-1"></i>Chiqish
          </button>
        </div>
      </div>
    </div>
  </nav>

  <div class="container my-4">

    <!-- Admin notice -->
    <div class="admin-notice">
      <i class="bi bi-shield-lock-fill fs-4 text-warning"></i>
      <div>
        <div class="fw-semibold">Xodimlarni boshqarish</div>
        <div class="small opacity-75">Bu sahifa faqat Administrator uchun</div>
      </div>
    </div>

    <!-- Page header -->
    <div class="page-top">
      <h3><i class="bi bi-people text-dark me-2"></i>Xodimlar</h3>
      <button class="btn btn-dark"
        data-bs-toggle="modal" data-bs-target="#userModal" onclick="openAddForm()">
        <i class="bi bi-plus-lg me-1"></i>Yangi xodim
      </button>
    </div>

    <!-- Search -->
    <div class="search-box">
      <i class="bi bi-search"></i>
      <input id="searchInput" class="form-control"
        placeholder="Ism yoki email bo'yicha qidirish..." oninput="renderTable()" />
    </div>

    <!-- Table -->
    <div class="tbl-card">
      <div class="table-responsive">
        <table class="table table-striped table-hover">
          <thead class="table-dark">
            <tr>
              <th><i class="bi bi-hash"></i></th>
              <th><i class="bi bi-person me-1"></i>To'liq ism</th>
              <th><i class="bi bi-envelope me-1"></i>Elektron pochta</th>
              <th><i class="bi bi-shield me-1"></i>Rol</th>
              <th><i class="bi bi-gear me-1"></i>Amallar</th>
            </tr>
          </thead>
          <tbody id="usersTableBody"></tbody>
        </table>
      </div>
    </div>
  </div>

  <!-- Modal -->
  <div class="modal fade" id="userModal" tabindex="-1">
    <div class="modal-dialog">
      <div class="modal-content">
        <div class="modal-header bg-dark text-white">
          <h5 class="modal-title fw-semibold" id="modalTitle">
            <i class="bi bi-person-plus me-2"></i>Yangi xodim
          </h5>
          <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body">
          <div id="formError" class="alert alert-danger d-flex align-items-center gap-2 d-none py-2">
            <i class="bi bi-exclamation-circle-fill"></i><span></span>
          </div>
          <input type="hidden" id="userId" />
          <div class="mb-3">
            <label class="form-label">To'liq ism *</label>
            <input id="fullName" class="form-control" placeholder="Masalan: Ali Valiyev" />
          </div>
          <div class="mb-3">
            <label class="form-label">Elektron pochta *</label>
            <input id="email" type="email" class="form-control" placeholder="ali@caretrack.uz" />
          </div>
          <div class="mb-3" id="passwordGroup">
            <label class="form-label">Parol *</label>
            <input id="password" type="password" class="form-control" placeholder="Kamida 6 ta belgi" />
            <div id="passwordHint" class="form-text text-muted d-none">
              <i class="bi bi-info-circle me-1"></i>Bo'sh qoldiring — parol o'zgarmaydi
            </div>
          </div>
          <div class="mb-3">
            <label class="form-label">Rol *</label>
            <select id="userRole" class="form-select">
              <option value="">— rolni tanlang —</option>
              <option value="admin">🔴 Administrator</option>
              <option value="clinician">🔵 Klinitsist</option>
              <option value="receptionist">🟢 Qabulxona xodimi</option>
            </select>
          </div>
        </div>
        <div class="modal-footer">
          <button class="btn btn-outline-secondary" data-bs-dismiss="modal">
            <i class="bi bi-x-lg me-1"></i>Bekor qilish
          </button>
          <button class="btn btn-dark" onclick="saveUser()">
            <i class="bi bi-check-lg me-1"></i>Saqlash
          </button>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script>
    const token      = localStorage.getItem('token');
    const role       = localStorage.getItem('role');
    const fullNameMe = localStorage.getItem('fullName');

    const ROLE_LABEL = {
      admin: 'Administrator', clinician: 'Klinitsist', receptionist: "Qabulxona bo'limi",
    };
    const ROLE_BADGE = {
      admin: 'danger', clinician: 'primary', receptionist: 'success',
    };

    if (!token) { window.location.href = 'login.html'; }
    if (role !== 'admin') { window.location.href = 'dashboard.html'; }

    document.getElementById('navFullName').textContent = fullNameMe || '';
    document.getElementById('navRole').textContent     = ROLE_LABEL[role] || role;

    function logout() { localStorage.clear(); window.location.href = 'login.html'; }

    async function authFetch(url, options = {}) {
      const res = await fetch(url, {
        ...options,
        headers: { 'Content-Type': 'application/json', 'Authorization': 'Bearer ' + token, ...(options.headers || {}) },
      });
      if (res.status === 401) { localStorage.clear(); window.location.href = 'login.html'; return null; }
      return res;
    }

    let allUsers = [];

    async function loadUsers() {
      const res = await authFetch('/api/users');
      if (!res) return;
      allUsers = await res.json();
      renderTable();
    }

    function renderTable() {
      const search = document.getElementById('searchInput').value.toLowerCase();
      const tbody  = document.getElementById('usersTableBody');
      const filtered = allUsers.filter(u =>
        u.fullName.toLowerCase().includes(search) ||
        u.email.toLowerCase().includes(search)
      );
      tbody.innerHTML = filtered.map(u => {
        const badgeColor = ROLE_BADGE[u.role] || 'secondary';
        const roleText   = ROLE_LABEL[u.role]  || u.role;
        const isMe       = u.email === localStorage.getItem('email');
        return `
          <tr ${isMe ? 'class="table-active"' : ''}>
            <td>${u.id}</td>
            <td>
              ${u.fullName}
              ${isMe ? '<span class="badge bg-secondary ms-1"><i class="bi bi-person-check me-1"></i>Siz</span>' : ''}
            </td>
            <td><i class="bi bi-envelope me-1 text-muted"></i>${u.email}</td>
            <td><span class="badge bg-${badgeColor}">${roleText}</span></td>
            <td>
              <button class="btn btn-sm btn-warning" onclick="openEditForm(${u.id})"><i class="bi bi-pencil me-1"></i>Tahrir</button>
              ${!isMe
                ? `<button class="btn btn-sm btn-danger ms-1" onclick="deleteUser(${u.id}, '${u.fullName.replace(/'/g,"\\'")}')"><i class="bi bi-trash me-1"></i>O'chirish</button>`
                : ''}
            </td>
          </tr>`;
      }).join('');
    }

    function clearFormError() {
      const el = document.getElementById('formError');
      el.classList.add('d-none');
      el.querySelector('span').textContent = '';
    }

    function showFormError(msg) {
      const el = document.getElementById('formError');
      el.querySelector('span').textContent = msg;
      el.classList.remove('d-none');
    }

    function openAddForm() {
      clearFormError();
      document.getElementById('modalTitle').innerHTML = '<i class="bi bi-person-plus me-2"></i>Yangi xodim qo\'shish';
      document.getElementById('userId').value    = '';
      document.getElementById('fullName').value  = '';
      document.getElementById('email').value     = '';
      document.getElementById('password').value  = '';
      document.getElementById('userRole').value  = '';
      document.getElementById('password').placeholder = 'Kamida 6 ta belgi';
      document.getElementById('passwordHint').classList.add('d-none');
    }

    function openEditForm(id) {
      clearFormError();
      const u = allUsers.find(x => x.id === id);
      document.getElementById('modalTitle').innerHTML = '<i class="bi bi-pencil me-2"></i>Xodimni tahrirlash';
      document.getElementById('userId').value    = u.id;
      document.getElementById('fullName').value  = u.fullName;
      document.getElementById('email').value     = u.email;
      document.getElementById('password').value  = '';
      document.getElementById('userRole').value  = u.role;
      document.getElementById('password').placeholder = 'O\'zgartirmaslik uchun bo\'sh qoldiring';
      document.getElementById('passwordHint').classList.remove('d-none');
      new bootstrap.Modal(document.getElementById('userModal')).show();
    }

    async function saveUser() {
      clearFormError();
      const id       = document.getElementById('userId').value;
      const fullName = document.getElementById('fullName').value.trim();
      const email    = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      const userRole = document.getElementById('userRole').value;

      if (!fullName || !email || !userRole) {
        showFormError('To\'liq ism, email va rol majburiy!');
        return;
      }
      if (!id && !password) {
        showFormError('Yangi xodim uchun parol majburiy!');
        return;
      }
      if (password && password.length < 6) {
        showFormError('Parol kamida 6 ta belgidan iborat bo\'lishi kerak!');
        return;
      }

      const body = { fullName, email, role: userRole };
      if (password) body.password = password;

      let res;
      if (id) {
        res = await authFetch('/api/users/' + id, { method: 'PUT', body: JSON.stringify(body) });
      } else {
        res = await authFetch('/api/users', { method: 'POST', body: JSON.stringify(body) });
      }
      if (!res) return;

      const data = await res.json();
      if (!res.ok) {
        showFormError(data.error || 'Xatolik yuz berdi');
        return;
      }

      bootstrap.Modal.getInstance(document.getElementById('userModal')).hide();
      loadUsers();
    }

    async function deleteUser(id, name) {
      if (!confirm(`"${name}" xodimini o'chirishni tasdiqlaysizmi?`)) return;
      const res = await authFetch('/api/users/' + id, { method: 'DELETE' });
      if (!res) return;
      if (!res.ok) {
        const data = await res.json();
        alert(data.error || "O'chirishda xatolik");
        return;
      }
      loadUsers();
    }

    loadUsers();
  </script>
</body>
</html>
